<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yo Soy Eva</title>
  <meta name="description" content="Flores y arreglos florales artesanales." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #3a5a40;
      --rose:    #d4847a;
      --cream:   #fdf6ee;
      --muted:   #7a6e66;
      --radius:  12px;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--cream);
      color: #2c2018;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--green);
      color: #fff;
      text-align: center;
      padding: 2rem 1rem 1.5rem;
    }
    header h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); letter-spacing: 0.06em; }
    header p  { margin-top: 0.4rem; font-size: 1rem; opacity: 0.8; font-style: italic; }

    /* ── Category filter ── */
    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1.5rem 1rem 0.5rem;
    }
    .chip {
      border: 1.5px solid var(--green);
      border-radius: 99px;
      padding: 0.3rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      background: transparent;
      color: var(--green);
      transition: background 0.15s, color 0.15s;
    }
    .chip.active, .chip:hover { background: var(--green); color: #fff; }

    /* ── Grid ── */
    #catalog {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 1.5rem auto 4rem;
      padding: 0 1rem;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #f0e8df;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #e8ddd4 0%, #d6c9be 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .card-title { font-size: 1.1rem; font-weight: bold; color: var(--green); }
    .card-desc  { font-size: 0.88rem; color: var(--muted); flex: 1; }

    .card-price { font-size: 1rem; font-weight: bold; color: var(--rose); }

    /* variations select */
    .var-select {
      width: 100%;
      padding: 0.35rem 0.6rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fafafa;
      color: #333;
      cursor: pointer;
    }

    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      padding: 0.6rem;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-wa:hover { background: #1ebe5d; }
    .btn-wa svg { flex-shrink: 0; }

    /* ── Empty state ── */
    #empty {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      display: none;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid #e8ddd4;
    }
  </style>
</head>
<body>

<header>
  <h1 id="store-name">Yo Soy Eva</h1>
  <p>Flores artesanales con amor</p>
</header>

<div id="filters"></div>

<main id="catalog"></main>
<div id="empty"><p>No hay productos en esta categoría.</p></div>

<footer id="footer-text"></footer>

<script>
(function () {
  const site    = window.__SITE__ || {};
  const dataEl  = document.getElementById('catalog-data');
  const data    = dataEl ? JSON.parse(dataEl.textContent) : { products: [] };
  const products = data.products || [];

  const storeName = site.storeName || 'Yo Soy Eva';
  const wa        = (site.whatsappNumber || '').replace(/\D/g, '');
  const currency  = site.currency || 'ARS';

  document.getElementById('store-name').textContent = storeName;
  document.title = storeName;
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${storeName}`;

  function formatPrice(n) {
    return new Intl.NumberFormat('es-AR', { style: 'currency', currency, maximumFractionDigits: 0 }).format(n);
  }

  function waUrl(product, varName, price) {
    const variation = varName ? ` — ${varName}` : '';
    const text = `Hola! Me interesa: *${product.title}${variation}* (${formatPrice(price)})`;
    return `https://wa.me/${wa}?text=${encodeURIComponent(text)}`;
  }

  // ── Build category list ──
  const allCats = new Set();
  products.forEach(p => p.categories.forEach(c => allCats.add(c)));
  const categories = [...allCats].sort();

  let activeFilter = null;

  const filtersEl = document.getElementById('filters');
  const catalogEl = document.getElementById('catalog');
  const emptyEl   = document.getElementById('empty');

  function makeChip(label, value) {
    const btn = document.createElement('button');
    btn.className = 'chip' + (value === activeFilter ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      activeFilter = (activeFilter === value) ? null : value;
      render();
    });
    return btn;
  }

  function buildFilters() {
    filtersEl.innerHTML = '';
    if (categories.length === 0) return;
    filtersEl.appendChild(makeChip('Todos', null));
    categories.forEach(c => filtersEl.appendChild(makeChip(c, c)));
  }

  function makeCard(p) {
    const card = document.createElement('div');
    card.className = 'card';

    // image
    if (p.images && p.images.length > 0) {
      const img = document.createElement('img');
      img.className = 'card-img';
      img.src = p.images[0];
      img.alt = p.title;
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-img-placeholder';
      ph.textContent = '🌸';
      card.appendChild(ph);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = p.title;
    body.appendChild(title);

    if (p.description) {
      const desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = p.description;
      body.appendChild(desc);
    }

    const hasVars = p.variations && p.variations.length > 0;

    const priceEl = document.createElement('div');
    priceEl.className = 'card-price';
    priceEl.textContent = formatPrice(hasVars ? p.variations[0].price : p.price);
    body.appendChild(priceEl);

    let select = null;
    if (hasVars) {
      select = document.createElement('select');
      select.className = 'var-select';
      p.variations.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.price;
        opt.dataset.name = v.name;
        opt.textContent = `${v.name} — ${formatPrice(v.price)}`;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => {
        priceEl.textContent = formatPrice(Number(select.value));
      });
      body.appendChild(select);
    }

    if (wa) {
      const btn = document.createElement('a');
      btn.className = 'btn-wa';
      btn.target = '_blank';
      btn.rel = 'noopener noreferrer';

      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp`;

      btn.addEventListener('click', e => {
        if (!wa) { e.preventDefault(); alert('WhatsApp no configurado aún.'); return; }
        const varName  = select ? select.options[select.selectedIndex].dataset.name : '';
        const price    = select ? Number(select.value) : p.price;
        btn.href = waUrl(p, varName, price);
      });

      body.appendChild(btn);
    }

    card.appendChild(body);
    return card;
  }

  function render() {
    buildFilters();
    catalogEl.innerHTML = '';

    const visible = activeFilter
      ? products.filter(p => p.categories.includes(activeFilter))
      : products;

    if (visible.length === 0) {
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      visible.forEach(p => catalogEl.appendChild(makeCard(p)));
    }
  }

  render();
})();
</script>

</body>
</html>
